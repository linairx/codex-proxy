services:
  codex-proxy:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8080}:8080"
      - "1455:1455"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
