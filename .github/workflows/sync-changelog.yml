name: Sync CHANGELOG to README

on:
  push:
    branches: [master]
    paths: [CHANGELOG.md]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract recent changelog highlights and update README
        run: |
          node - <<'JSEOF'
          const fs = require("fs");

          const changelog = fs.readFileSync("CHANGELOG.md", "utf-8").replace(/\r\n/g, "\n");
          const readme = fs.readFileSync("README.md", "utf-8").replace(/\r\n/g, "\n");

          // Only show Unreleased + latest released version
          const MAX_VERSIONS = 2;
          const MAX_ITEMS_PER_CATEGORY = 5;
          const CATEGORIES = ["Added", "Changed", "Fixed"];

          // Split into version sections by "## " headings
          const sections = changelog.split(/(?=^## )/m).filter(s => s.startsWith("## "));

          let output = [];
          let count = 0;

          for (const section of sections) {
            if (count >= MAX_VERSIONS) break;

            const titleLine = section.split("\n")[0];
            const sectionItems = [];

            for (const cat of CATEGORIES) {
              const re = new RegExp(`### ${cat}\\n([\\s\\S]*?)(?=\\n### |\\n## |$)`);
              const match = section.match(re);
              if (!match) continue;

              // Collect top-level items (start with "- "), include sub-items (start with "  ")
              const lines = match[1].trim().split("\n");
              const items = [];
              for (const line of lines) {
                if (line.startsWith("- ")) {
                  items.push(line);
                } else if (line.startsWith("  ") && items.length > 0) {
                  items[items.length - 1] += "\n" + line;
                }
              }
              if (items.length === 0) continue;

              sectionItems.push(`**${cat}**`);
              const shown = items.slice(0, MAX_ITEMS_PER_CATEGORY);
              sectionItems.push(...shown);
              if (items.length > MAX_ITEMS_PER_CATEGORY) {
                sectionItems.push(`- ...（[查看全部](./CHANGELOG.md)）`);
              }
            }

            if (sectionItems.length === 0) continue;

            const demotedTitle = titleLine.replace(/^## /, "### ");
            output.push(demotedTitle);
            output.push("");
            output.push(...sectionItems);
            output.push("");
            count++;
          }

          if (output.length === 0) {
            console.log("No changelog sections found");
            process.exit(0);
          }

          const content = output.join("\n").trim();
          const pattern = /(<!-- CHANGELOG:START -->)[\s\S]*?(<!-- CHANGELOG:END -->)/;
          const replacement = `<!-- CHANGELOG:START -->\n${content}\n<!-- CHANGELOG:END -->`;
          const newReadme = readme.replace(pattern, replacement);

          if (newReadme === readme) {
            console.log("README unchanged");
            process.exit(0);
          }

          fs.writeFileSync("README.md", newReadme, "utf-8");
          console.log(`Updated README with ${count} changelog section(s)`);
          JSEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes" && exit 0
          git add README.md
          git commit -m "docs: auto-sync changelog to README [skip ci]"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed (attempt $i/3), rebasing and retrying..."
            git pull --rebase origin master
            sleep 2
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
